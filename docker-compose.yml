version: '3.8'

services:
  ros2_humble:
    build:
      context: .
      dockerfile: Dockerfile.fast
    image: star_tracker_ros2:humble
    container_name: star_tracker_ros2
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
    volumes:
      # Only mount src for development - build/install/log are in the image
      - ./src:/home/ros2_ws/src:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev:/dev
    devices:
      - /dev/dri:/dev/dri
      - /dev/video0:/dev/video0
    command: bash -c "source /opt/ros/humble/setup.bash && source /home/ros2_ws/install/setup.bash && tail -f /dev/null"